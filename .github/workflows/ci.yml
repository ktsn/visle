name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: voidzero-dev/setup-vp@2dec1e33f4ab2c6d5bce1b0c4607961bb1a3f7a1 # v1
        with:
          node-version: '24'
          cache: true
          run-install: true

      - run: vp run -r build
      - run: vp check

  publish-dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: voidzero-dev/setup-vp@2dec1e33f4ab2c6d5bce1b0c4607961bb1a3f7a1 # v1
        with:
          node-version: '24'
          cache: true
          run-install: true

      - name: Publish dry run
        run: vpx jsr publish --dry-run

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: voidzero-dev/setup-vp@2dec1e33f4ab2c6d5bce1b0c4607961bb1a3f7a1 # v1
        with:
          node-version: '24'
          cache: true
          run-install: true

      - name: Get Playwright version
        id: playwright-version
        shell: bash
        run: echo "version=$(node -p "require('playwright/package.json').version")" >> "$GITHUB_OUTPUT"

      # Cache Playwright browser binaries to avoid downloading them on every run.
      # This significantly speeds up CI, especially on Windows where install takes several minutes.
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: |
            ~/.cache/ms-playwright
            ~/AppData/Local/ms-playwright
          key: playwright-${{ matrix.os }}-${{ steps.playwright-version.outputs.version }}

      # Install Playwright browsers and system deps.
      # On cache hit, browser download is a no-op but Linux still needs system deps installed.
      # Windows bundles its own deps, so it can skip this step entirely on cache hit.
      - name: Install Playwright
        if: steps.playwright-cache.outputs.cache-hit != 'true' || runner.os == 'Linux'
        run: vp exec playwright install --with-deps chromium

      - name: Test
        run: vp test
